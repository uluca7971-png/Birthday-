<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy Birthday!</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <canvas id="confetti"></canvas>

  <div class="floating-shapes">
    <span></span><span></span><span></span><span></span><span></span>
  </div>

  <main class="card">
    <div class="balloons">
      <div class="balloon b1"></div>
      <div class="balloon b2"></div>
      <div class="balloon b3"></div>
    </div>

    <div class="cake">
      <div class="candles">
        <div class="candle"><div class="flame"></div></div>
        <div class="candle"><div class="flame"></div></div>
        <div class="candle"><div class="flame"></div></div>
      </div>
      <div class="frosting"></div>
      <div class="layer layer-top"></div>
      <div class="layer layer-middle"></div>
      <div class="layer layer-bottom"></div>
      <div class="plate"></div>
    </div>

    <p class="subtitle">🎉 Today is your special day 🎉</p>
    <h1>Happy Birthday!</h1>
    <h2 class="name">Kiki</h2>
    <p class="message">
      Wishing you a day filled with laughter, love, and all the little things that make you smile.
      I'm so glad we're friends — you deserve the happiest birthday ever! 💖
    </p>

    <button id="wishBtn" class="wish-btn">Make a wish! ✨</button>
  </main>

  <script src="script.js"></script>
</body>
</html>
